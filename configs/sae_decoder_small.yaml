# SAE hyperparameters for the decoder_small transformer.
#
#   - dim_input must equal model.d_model (128 for stream/mlp) or model.n_heads * model.d_head (attention).
#   - context_len must equal model.n_ctx (256).


# -- Architecture --
dim_input: 128        # matches model.d_model for hook_type=stream or mlp
dim_sae: 1024         # expansion factor 8; bump to 2048+ once the pipeline works
hook_type: "stream"   # stream | mlp | attention
layer: 2              # which transformer layer to attach the SAE to (valid: 0..n_layers-1)

# -- Training schedule --
lr: 3.0e-4
batch_size: 4096                 # train_batch_size_tokens in SAELens terms
training_tokens: 2000000         # ~1.3 epochs over the 1.49M cached train tokens
context_len: 256                 # MUST equal model.n_ctx

# -- Sparsity / reconstruction --
l1_coeff: 5.0
l1_warmup_steps: 500             # warm up sparsity penalty over first 500 steps
lr_warmup_steps: 100
apply_bias_decay_to_input: true
normalize_activations: "expected_average_only_in"

# -- SAELens ActivationsStore buffering --
# SAELens requires num_batches_in_buffer * context_len >= train_batch_size_tokens.
# With context_len=256 and batch_size=4096, that means num_batches_in_buffer >= 16.
# Use 32 for ~2x headroom (8192-token buffer vs 4096-token training batches).
num_batches_in_buffer: 32
store_batch_size_prompts: 16

seed: 32